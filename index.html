<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laman Web Capai Terus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Header / Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                
                <!-- Bahagian Logo (Menggunakan imej dari GitHub) -->
                <div class="flex items-center gap-3">
                    <div class="flex-shrink-0">
                        <img 
                            src="https://raw.githubusercontent.com/web/capaiterus/d40453d34b07e817355a4ac18446e93051f9f963/logo.png" 
                            alt="Logo Capai Terus" 
                            class="h-12 w-auto object-contain"
                            onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=Logo+Error';"
                        >
                    </div>
                    <div>
                        <span class="text-xl font-bold tracking-tight text-indigo-600 block leading-none">CAPAI TERUS</span>
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Official Platform</span>
                    </div>
                </div>

                <!-- Menu Navigasi -->
                <div class="hidden md:flex space-x-8 text-sm font-medium">
                    <a href="#" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Utama</a>
                    <a href="#" class="text-gray-500 hover:text-indigo-600 transition">Perkhidmatan</a>
                    <a href="#" class="text-gray-500 hover:text-indigo-600 transition">Tentang Kami</a>
                    <a href="#" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition shadow-md">Hubungi</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button class="text-gray-500 p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 mb-6">
            Selamat Datang ke <span class="text-indigo-600">Capai Terus</span>
        </h1>
        <p class="text-xl text-gray-600 max-w-2xl mx-auto mb-10">
            Logo anda kini telah dihubungkan terus ke repositori GitHub. Jika imej tidak muncul, pastikan repositori tersebut adalah <strong>Public</strong>.
        </p>
        <div class="flex flex-wrap justify-center gap-4">
            <button class="px-8 py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transform hover:scale-105 transition shadow-lg">
                Mula Sekarang
            </button>
            <button class="px-8 py-4 bg-white text-indigo-600 font-bold border-2 border-indigo-100 rounded-xl hover:border-indigo-600 transition">
                Ketahui Lanjut
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 mt-20 py-10">
        <div class="text-center text-gray-400 text-sm">
            &copy; 2024 Capai Terus. Hak Cipta Terpelihara.
        </div>
    </footer>

</body>
</html>
